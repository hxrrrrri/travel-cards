name: tripgraph
description: TripGraph - Travel Discovery Graph App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Maps (free, no API key for OSM)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location + permissions
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # HTTP client — Overpass + OSRM + ORS APIs
  dio: ^5.7.0

  # Local storage
  hive_flutter: ^1.1.0

  # Cloud DB + Auth (optional — app works without)
  supabase_flutter: ^2.8.0

  # Utils
  uuid: ^4.4.2
  url_launcher: ^6.3.1
  intl: ^0.19.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
